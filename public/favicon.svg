<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Mood Control">
  <title>Mood Control</title>
  <!-- EL NÚCLEO.
       Un disco partido en dos: violeta = Mood Agency, cian = Mood Creative.
       Sin degradados ni detalle fino A PROPÓSITO: a 16px un degradado se
       promedia a un gris sucio y la marca deja de leerse. Dos planos de color
       y un corte de 4 unidades (≈1px a 16px) es lo único que sobrevive a esa
       miniatura, y es todo lo que hace falta para contar la idea. -->
  <rect width="64" height="64" rx="14" fill="#050505"/>
  <path d="M32 8A24 24 0 0 0 32 56Z" transform="translate(-2 0)" fill="#B026FF"/>
  <path d="M32 8A24 24 0 0 1 32 56Z" transform="translate(2 0)" fill="#00E5FF"/>
</svg>
