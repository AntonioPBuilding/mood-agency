<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>Mood Agency — Creamos estados de ánimo</title>
    <meta
      name="description"
      content="Mood Agency es una agencia creativa con dos almas: Mood Control, producción de eventos, DJs y experiencias inmersivas. Mood Net, desarrollo web, IA y software a medida."
    />
    <meta name="theme-color" content="#050505" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mood Agency — Creamos estados de ánimo" />
    <meta
      property="og:description"
      content="Eventos, DJs y experiencias inmersivas. Desarrollo web, IA y software a medida. Dos divisiones, un mismo estándar."
    />
    <meta property="og:image" content="/og.jpg" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Tipografía variable. preconnect antes del stylesheet: ahorra ~300ms de
         handshake en el primer render, que en el Hero se nota. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:ital,wdth,wght@0,62..125,100..900;1,62..125,100..900&family=JetBrains+Mono:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Mood Agency",
        "description": "Agencia creativa: producción de eventos y desarrollo tecnológico.",
        "department": [
          { "@type": "Organization", "name": "Mood Control" },
          { "@type": "Organization", "name": "Mood Net" }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
